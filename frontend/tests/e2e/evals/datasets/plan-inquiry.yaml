# plan-inquiry 套餐查询技能 — promptfoo 评测数据集
# 来源: plan-inquiry.sop.spec.ts (SOP-PI-01~08)

# ═══════════════════════════════════════════════════════════════════════════
# PI-01: 浏览套餐 (2 轮)
# ═══════════════════════════════════════════════════════════════════════════
- description: "PI-01: 浏览套餐→了解详情"
  vars:
    message: "multi-turn"
    turns:
      - message: "我想看看你们有什么手机套餐"
      - message: "100 元那个套餐具体包含什么？流量和通话时长分别多少？"
    user_phone: "13800000001"
  assert:
    - type: llm-rubric
      value: |
        第一轮应展示可用套餐列表（含套餐名称、月费、流量等信息）。
        第二轮应详细说明指定套餐的权益（流量、通话时长等）。
    - type: contains-any
      value: [套餐, 月费, 流量, 元, GB]

# ═══════════════════════════════════════════════════════════════════════════
# PI-02: 浏览后用户放弃 (2 轮)
# ═══════════════════════════════════════════════════════════════════════════
- description: "PI-02: 浏览套餐→用户放弃"
  vars:
    message: "multi-turn"
    turns:
      - message: "有什么便宜的手机套餐？"
      - message: "算了，暂时不换了，谢谢"
    user_phone: "13800000001"
  assert:
    - type: llm-rubric
      value: |
        第一轮应展示套餐信息。
        第二轮用户说不换了，回复应礼貌结束（如"好的""了解""随时找我"等）。
    - type: contains-any
      value: [好的, 了解, 随时, 需要, 帮助, 再见, 不客气]

# ═══════════════════════════════════════════════════════════════════════════
# PI-03: 套餐升级 (2 轮)
# ═══════════════════════════════════════════════════════════════════════════
- description: "PI-03: 分析用量→推荐升级"
  vars:
    message: "multi-turn"
    turns:
      - message: "我觉得现在的流量不够用，想看看有没有更大的套餐"
      - message: "你觉得哪个最适合我？帮我推荐一个"
    user_phone: "13800000001"
  assert:
    - type: llm-rubric
      value: |
        第一轮应查询用户当前套餐和用量，展示相关信息。
        第二轮应给出个性化推荐（基于用量分析）。
    - type: contains-any
      value: [套餐, 流量, 用量, GB, 月费, 元, 升级, 推荐]

# ═══════════════════════════════════════════════════════════════════════════
# PI-06: 套餐对比 (2 轮)
# ═══════════════════════════════════════════════════════════════════════════
- description: "PI-06: 两个套餐对比→推荐"
  vars:
    message: "multi-turn"
    turns:
      - message: "帮我对比一下 50 元和 100 元套餐有什么区别"
      - message: "哪个更划算？你推荐哪个？"
    user_phone: "13800000001"
  assert:
    - type: llm-rubric
      value: |
        第一轮应对比两个套餐的差异（价格、流量、通话等维度）。
        第二轮应给出推荐建议。
    - type: contains-any
      value: [对比, 区别, 差异, 月费, 流量, 元, GB]

# ═══════════════════════════════════════════════════════════════════════════
# PI-07: 月底流量不够 (2 轮)
# ═══════════════════════════════════════════════════════════════════════════
- description: "PI-07: 流量不够→升级/加油包建议"
  vars:
    message: "multi-turn"
    turns:
      - message: "每个月到月底流量就不够用，怎么办"
      - message: "推荐一个适合我的方案"
    user_phone: "13800000001"
  assert:
    - type: llm-rubric
      value: |
        第一轮应查询用户流量用量，识别月底流量不足问题。
        第二轮应推荐解决方案（升级套餐或购买加油包）。
    - type: contains-any
      value: [流量, 用量, 套餐, 不够, 升级, 加油包, 月底, GB]

# ═══════════════════════════════════════════════════════════════════════════
# PI-08: 突然变慢→分流到故障诊断 (2 轮)
# ═══════════════════════════════════════════════════════════════════════════
- description: "PI-08: 网速突然变慢→分流诊断"
  vars:
    message: "multi-turn"
    turns:
      - message: "手机上网突然变得特别慢，是不是流量用完了？"
      - message: "那帮我看看到底什么原因"
    user_phone: "13800000001"
  assert:
    - type: llm-rubric
      value: |
        用户反映网速突然变慢。第一轮应区分是流量耗尽还是网络故障。
        第二轮应引导故障诊断或排查方向。
    - type: contains-any
      value: [故障, 诊断, 排查, 网络, 检测, 信号, 流量, 月底, 慢]
