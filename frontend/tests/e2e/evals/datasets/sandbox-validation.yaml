# sandbox-validation 沙箱 Mock 验证 — promptfoo 评测数据集
# 来源: sandbox-validation.validate.spec.ts 的 14 个 Mock 场景
# 原测试使用 soft assertion (log-only)，此处用 llm-rubric + contains-any

# ── bill-inquiry ──────────────────────────────────────────────────────────
- description: "SB-bill-inquiry-查询账单"
  vars:
    message: "查询本月账单"
    skill: "bill-inquiry"
  assert:
    - type: llm-rubric
      value: "回复应展示账单或费用信息。"
      threshold: 0.5
    - type: contains-any
      value: [账单, 元, 费用]

- description: "SB-bill-inquiry-费用异常"
  vars:
    message: "我的账单金额比上个月高了很多，帮我看看"
    skill: "bill-inquiry"
  assert:
    - type: llm-rubric
      value: "回复应分析账单异常或展示费用对比信息。"
      threshold: 0.5

# ── fault-diagnosis ───────────────────────────────────────────────────────
- description: "SB-fault-diagnosis-网速慢"
  vars:
    message: "我的手机网速非常慢"
    skill: "fault-diagnosis"
  assert:
    - type: llm-rubric
      value: "回复应包含网络诊断信息或排查建议。"
      threshold: 0.5
    - type: contains-any
      value: [网速, 信号, 诊断, 网络]

- description: "SB-fault-diagnosis-无信号"
  vars:
    message: "手机完全没有信号"
    skill: "fault-diagnosis"
  assert:
    - type: llm-rubric
      value: "回复应针对无信号问题给出诊断或排查方向。"
      threshold: 0.5
    - type: contains-any
      value: [信号, 基站, SIM, 诊断]

# ── plan-inquiry ──────────────────────────────────────────────────────────
- description: "SB-plan-inquiry-套餐推荐"
  vars:
    message: "推荐一个适合我的套餐"
    skill: "plan-inquiry"
  assert:
    - type: llm-rubric
      value: "回复应推荐套餐或引导了解套餐。"
      threshold: 0.5
    - type: contains-any
      value: [套餐, 推荐, 流量, 月费]

- description: "SB-plan-inquiry-套餐对比"
  vars:
    message: "50G套餐和100G套餐有什么区别"
    skill: "plan-inquiry"
  assert:
    - type: llm-rubric
      value: "回复应对比两个套餐的差异。"
      threshold: 0.5
    - type: contains-any
      value: [套餐, 对比, 区别, 流量]

# ── service-cancel ────────────────────────────────────────────────────────
- description: "SB-service-cancel-退订业务"
  vars:
    message: "我要退订视频会员流量包"
    skill: "service-cancel"
  assert:
    - type: llm-rubric
      value: "回复应围绕退订视频会员展开，先查询或确认，不应直接声称退订成功。"
      threshold: 0.5
    - type: contains-any
      value: [退订, 视频, 业务]

- description: "SB-service-cancel-未知扣费"
  vars:
    message: "我的账单里有一笔不认识的扣费"
    skill: "service-cancel"
  assert:
    - type: llm-rubric
      value: "回复应帮用户查询扣费来源。"
      threshold: 0.5
    - type: contains-any
      value: [扣费, 账单, 费用]

# ── telecom-app ───────────────────────────────────────────────────────────
- description: "SB-telecom-app-登录失败"
  vars:
    message: "营业厅App登录失败了"
    skill: "telecom-app"
  assert:
    - type: llm-rubric
      value: "回复应针对App登录失败给出诊断或解决建议。"
      threshold: 0.5
    - type: contains-any
      value: [登录, 密码, App, 营业厅]

- description: "SB-telecom-app-账号被锁"
  vars:
    message: "营业厅App账号被锁定了"
    skill: "telecom-app"
  assert:
    - type: llm-rubric
      value: "回复应针对账号锁定给出处理建议（如联系客服、重置密码等）。"
      threshold: 0.5
    - type: contains-any
      value: [锁定, 客服, 密码, 解锁]

# ── outbound-collection ───────────────────────────────────────────────────
- description: "SB-outbound-collection-开场"
  vars:
    message: "你好"
    skill: "outbound-collection"
  assert:
    - type: llm-rubric
      value: "回复应是外呼催收的开场白，介绍来意或确认身份。"
      threshold: 0.5

# ── outbound-marketing ────────────────────────────────────────────────────
- description: "SB-outbound-marketing-开场"
  vars:
    message: "你好"
    skill: "outbound-marketing"
  assert:
    - type: llm-rubric
      value: "回复应是外呼营销的开场白，介绍来意或推荐产品。"
      threshold: 0.5
