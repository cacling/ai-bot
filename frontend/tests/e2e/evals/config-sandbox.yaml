# AI-Bot 语义评测 — 沙箱 Mock 验证 (sandbox-test provider)

description: AI-Bot 语义评测 — 沙箱验证

defaultTest:
  options:
    provider:
      id: openai:chat:qwen-max
      config:
        apiBaseUrl: https://dashscope.aliyuncs.com/compatible-mode/v1
        apiKeyEnvar: SKILL_CREATOR_API_KEY
  threshold: 0.5

prompts:
  - "{{message}}"

providers:
  - id: file://providers/sandbox-test.ts
    label: sandbox-test

tests:
  - file://datasets/sandbox-validation.yaml
